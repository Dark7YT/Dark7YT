name: Generate Metrics

on:
  # Updates the stats card automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Lets you run it manually from the Actions tab
  workflow_dispatch:
  # Also runs on every push to main
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token stored as a repo secret (see setup steps)
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Lima
          config_animations: yes

          # Language breakdown (replaces the old "top languages" card)
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
